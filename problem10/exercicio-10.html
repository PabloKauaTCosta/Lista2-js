<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Cálculo de velocidade média</title>
    <style>
    body {
        font-family: Arial;
        max-width: 350px;
        margin: 50px auto;
        padding: 20px;
    }
    #km {
        padding: 8px;
        margin: 3px;
        font-size: 16px;
    }
    #valorTempo {
        padding: 8px;
        margin: 3px;
        font-size: 16px;
    }
    #tempo {
        padding: 8px;
        margin: 3px;
        font-size: 16px;
    }
    #botaoId {
        padding: 8px;
        margin: 3px;
        font-size: 16px;
    }
    label {
        display: inline-block;
        width: 90px;
    }
    #resultadoFinal {
        margin-top: 15px;
        padding: 12px;
        background: #f0f0f0;
        border-radius: 5px;
    }
    </style>
</head>
<body>
    <h2>Velocidade Média</h2>
    
    Distância (km): <input id="km"><br>
    
    Tempo:  <select id="tempo">
            <option value="h">Horas</option>
            <option value="min">Minutos</option>
            </select>

    <input id="valorTempo"><br>
    
    <button id="botaoId" onclick="calcularResultado()">Calcular</button>
    
    <div id="resultadoFinal"></div>
</body>
</html>
