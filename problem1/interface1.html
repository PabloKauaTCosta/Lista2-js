<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juros Compostos</title>
    <style>
        body {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
        }
        .card {
            background: #BC8F8F;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { color: #333; margin-top: 0; }
        input {
            display: block;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            padding: 12px;
            width: 100%;
            font-size: 16px;
            background-color: 	#DB7093;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color:#CD5C5C; }
        #resultadoGeral {
            margin-top: 20px;
            padding: 15px;
            background: #e9f7ef;
            border-left: 5px solid #CD5C5C;
            border-radius: 4px;
            display: none;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Simulador de Juros</h2>
        
        <label for="valorInicial">Investimento Inicial:</label>
        <input id="valorInicial" type="number" placeholder="Ex: 1000.00">
        
        <label for="mesesInput">Tempo (Meses):</label>
        <input id="mesesInput" type="number" placeholder="Ex: 12">

        <button id="btnCalcular">Calcular Agora</button>

        <div id="resultadoGeral"></div>
    </div>

    <script src="exercicio-01.js"></script>
</body>
</html>
