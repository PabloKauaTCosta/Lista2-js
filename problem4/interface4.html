<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda com frete</title>
    <style>
    
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .cart-card {
            background: 	#FFF8DC;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 350px;
            border: 1px solid #e1e4e8;
        }

        h2 {
            color: 	#5F9EA0;
            font-size: 1.25rem;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #5F9EA0;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #edf2f7;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #4a90e2;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #5F9EA0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #008080;
        }

        #resultadoVenda {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px dashed #e2e8f0;
            display: none;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #718096;
        }

        .total-row {
            margin-top: 12px;
            font-size: 1.15rem;
            font-weight: 800;
            color: #2d3748;
        }

        .shipping-badge {
            color: #38a169;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="cart-card">
        <h2>Carrinho</h2>
        
        <div class="input-section">
            <label for="valorProdutos">VALOR DOS PRODUTOS (R$)</label>
            <input type="number" id="valorProdutos" placeholder="0.00" step="0.01">
        </div>

        <button id="btnCalcular">Finalizar Cálculo</button>

        <div id="resultadoVenda">
            <div class="row">
                <span>Subtotal:</span>
                <span id="resSubtotal"></span>
            </div>
            <div class="row">
                <span>Entrega:</span>
                <span class="shipping-badge" id="resFrete"></span>
            </div>
            <div class="row total-row">
                <span>Total:</span>
                <span id="resTotal"></span>
            </div>
        </div>
    </div>

    <script src="exercicio-04.js"></script>
</body>
</html>
